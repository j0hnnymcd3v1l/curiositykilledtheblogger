<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} — {{ .Site.Title }}{{ end }}</title>
  <meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=Source+Serif+4:ital,opsz,wght@0,8..60,300;0,8..60,400;0,8..60,500;1,8..60,300;1,8..60,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <nav class="nav">
    <a href="/" class="nav-logo">CKTB</a>
    <div class="nav-links">
      <a href="/categories/fiction/">Fiction</a>
      <a href="/categories/non-fiction/">Non-Fiction</a>
      <a href="/categories/flash-fiction/">Flash Fiction</a>
      <a href="/about/">About</a>
    </div>
    <button class="nav-toggle" aria-label="Menu">
      <span></span><span></span>
    </button>
  </nav>

  <main>
    {{ block "main" . }}{{ end }}
  </main>

  <footer class="footer">
    <div class="footer-left">
      <span class="footer-domain">curiositykilledtheblogger.com</span>
      <span class="footer-sep">·</span>
      <span class="footer-copy">&copy; {{ now.Year }} Miguel Coias</span>
    </div>
    <div class="footer-links">
      {{ with .Site.Params.actorSite }}<a href="{{ . }}">Actor</a>{{ end }}
      {{ with .Site.Params.instagram }}<a href="{{ . }}">Instagram</a>{{ end }}
    </div>
  </footer>

  <script>
    document.querySelector('.nav-toggle')?.addEventListener('click', function() {
      document.querySelector('.nav-links').classList.toggle('open');
    });
  </script>
</body>
</html>
